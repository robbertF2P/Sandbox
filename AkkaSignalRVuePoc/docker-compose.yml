name: akka-signalr-vue-poc

services:
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq-data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_strong_password123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: server/AkkaSignalRVuePoc.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kestrel__Endpoints__Http__Url: http://0.0.0.0:5000
      Cors__AllowedOrigins__0: http://localhost:5173
      Seq__ServerUrl: http://seq:5341
      ConnectionStrings__Catalog: "Server=sqlserver,1433;Database=AkkaSignalRPoc;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True"
      Database__Provider: SqlServer
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    ports:
      - "5000:5000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_SIGNALR_HUB_URL: http://localhost:5000/hubs/live-messages
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  seq-data:
  sqlserver-data:
