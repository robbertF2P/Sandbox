name: akka-signalr-vue-poc

services:
  api:
    build:
      context: .
      dockerfile: server/AkkaSignalRVuePoc.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kestrel__Endpoints__Http__Url: http://0.0.0.0:5000
      Cors__AllowedOrigins__0: http://localhost:5173
    ports:
      - "5000:5000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_SIGNALR_HUB_URL: http://localhost:5000/hubs/live-messages
    depends_on:
      - api
    ports:
      - "5173:80"
