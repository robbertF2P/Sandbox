name: api-import-actor-poc

services:
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5342:5341"
      - "8082:80"
    volumes:
      - seq-data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_password123"
      MSSQL_PID: Developer
    ports:
      - "1401:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: server/ApiImportActorPoc.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kestrel__Endpoints__Http__Url: http://0.0.0.0:5001
      Cors__AllowedOrigins__0: http://localhost:5174
      Seq__ServerUrl: http://seq:5341
      ConnectionStrings__Import: "Server=sqlserver,1433;Database=ApiImportPoc;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True"
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    ports:
      - "5001:5001"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5001
        VITE_SIGNALR_HUB_URL: http://localhost:5001/hubs/import
    depends_on:
      - api
    ports:
      - "5174:80"

volumes:
  seq-data:
  sqlserver-data:
