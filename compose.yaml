services:
  dev:
    image: docker.io/library/mono:6
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - /bin/sh
      - -lc
      - |
        echo "Sandbox development container is ready."
        echo "Source is mounted at /workspace."
        echo "Open a shell with: podman compose exec dev sh"
        sleep infinity
    stdin_open: true
    tty: true
