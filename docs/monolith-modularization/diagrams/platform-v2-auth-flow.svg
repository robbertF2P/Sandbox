<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 12px; fill: #475569; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .box-accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .box-idp { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 8; }
      .label { font-size: 13px; font-weight: 600; fill: #0f172a; }
      .detail { font-size: 11px; fill: #475569; }
      .step { font-size: 11px; fill: #1e293b; font-weight: 600; }
      .line { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="20" y="28" class="title">Platform 2.0  Cloud login flow (native runtime)</text>
  <text x="20" y="48" class="subtitle">OIDC Authorization Code + PKCE · platform-issued JWT · one database per tenant</text>

  <!-- Actors -->
  <rect x="20" y="70" width="110" height="52" class="box"/>
  <text x="75" y="92" text-anchor="middle" class="label">Browser</text>
  <text x="75" y="108" text-anchor="middle" class="detail">f2p-shell</text>

  <rect x="160" y="70" width="110" height="52" class="box"/>
  <text x="215" y="92" text-anchor="middle" class="label">Edge</text>
  <text x="215" y="108" text-anchor="middle" class="detail">slug resolve</text>

  <rect x="300" y="70" width="130" height="52" class="box-accent"/>
  <text x="365" y="92" text-anchor="middle" class="label">Control plane</text>
  <text x="365" y="108" text-anchor="middle" class="detail">tenant + SSO binding</text>

  <rect x="460" y="70" width="110" height="52" class="box-idp"/>
  <text x="515" y="92" text-anchor="middle" class="label">Customer IdP</text>
  <text x="515" y="108" text-anchor="middle" class="detail">Entra / Okta / SAML</text>

  <rect x="600" y="70" width="130" height="52" class="box-accent"/>
  <text x="665" y="92" text-anchor="middle" class="label">Identity API</text>
  <text x="665" y="108" text-anchor="middle" class="detail">token exchange</text>

  <rect x="760" y="70" width="140" height="52" class="box"/>
  <text x="830" y="92" text-anchor="middle" class="label">Domain APIs</text>
  <text x="830" y="108" text-anchor="middle" class="detail">tenant database</text>

  <!-- Steps -->
  <text x="30" y="155" class="step">1</text>
  <line x1="75" y1="122" x2="75" y2="145" class="line"/>
  <line x1="75" y1="145" x2="215" y2="145" class="line"/>
  <text x="130" y="140" class="detail">GET acme.app.example</text>

  <text x="30" y="195" class="step">2</text>
  <line x1="215" y1="155" x2="215" y2="185" class="line"/>
  <line x1="215" y1="185" x2="365" y2="185" class="line"/>
  <text x="285" y="180" class="detail">resolve slug</text>

  <text x="30" y="235" class="step">3</text>
  <line x1="365" y1="195" x2="365" y2="225" class="line"/>
  <line x1="365" y1="225" x2="75" y2="225" class="line"/>
  <text x="220" y="220" class="detail">authority, clientId, tenantId</text>

  <text x="30" y="275" class="step">4</text>
  <line x1="75" y1="235" x2="75" y2="265" class="line"/>
  <line x1="75" y1="265" x2="515" y2="265" class="line"/>
  <text x="295" y="260" class="detail">redirect + PKCE code_challenge</text>

  <text x="30" y="315" class="step">5</text>
  <line x1="515" y1="275" x2="515" y2="305" class="line"/>
  <line x1="515" y1="305" x2="75" y2="305" class="line"/>
  <text x="295" y="300" class="detail">login (MFA at IdP)</text>

  <text x="30" y="355" class="step">6</text>
  <line x1="75" y1="315" x2="75" y2="345" class="line"/>
  <line x1="75" y1="345" x2="665" y2="345" class="line"/>
  <text x="370" y="340" class="detail">/auth/callback?code=&</text>

  <text x="30" y="395" class="step">7</text>
  <line x1="665" y1="355" x2="665" y2="385" class="line"/>
  <line x1="665" y1="385" x2="515" y2="385" class="line"/>
  <text x="590" y="380" class="detail">exchange code</text>

  <text x="30" y="435" class="step">8</text>
  <line x1="665" y1="395" x2="665" y2="425" class="line"/>
  <text x="680" y="420" class="detail">map IdP subject ’ platform user</text>
  <text x="680" y="435" class="detail">issue JWT (tid, sub, roles)</text>

  <text x="30" y="475" class="step">9</text>
  <line x1="75" y1="445" x2="75" y2="465" class="line"/>
  <line x1="75" y1="465" x2="830" y2="465" class="line"/>
  <text x="450" y="460" class="detail">API calls with Bearer token ’ tenant DB connection</text>

  <rect x="20" y="490" width="880" height="24" fill="#f1f5f9" stroke="#cbd5e1" rx="4"/>
  <text x="30" y="506" class="detail">On-prem: fixed host + install config replaces steps 12 (no control plane lookup). Legacy-hosted: edge may proxy to legacy runtime after login.</text>
</svg>
