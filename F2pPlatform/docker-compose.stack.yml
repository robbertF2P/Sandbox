  f2p-platform-api:
    build:
      context: ..
      dockerfile: F2pPlatform/host/F2pPlatform.Host/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kestrel__Endpoints__Http__Url: http://0.0.0.0:5080
      Platform__ConfigurationApiKey: "${F2P_PLATFORM_CONFIG_API_KEY:?Set F2P_PLATFORM_CONFIG_API_KEY}"
      Seq__ServerUrl: http://seq:5341
      Tenant__FeatureFlags__hours-progress-approval: "true"
      Tenant__PackEntitlements__customizationPacks__0: acme-hour-approvals-v1
      PlatformConfig__UseSqlite: "true"
      HourApprovals__UseSqlite: "true"