<div class="f2p-home-module-grid">
  @for (tile of tiles(); track tile.route) {
    <article
      class="f2ps-tile f2ps-home-module-tile f2ps-clickable"
      [ngClass]="moduleClass(tile)"
      [attr.data-testid]="'home-tile-' + tile.label.toLowerCase()"
      [attr.aria-label]="tile.label + '. ' + tile.meta"
      (click)="onTileClick(tile)"
      (keyup.enter)="onTileClick(tile)"
      tabindex="0"
      role="button"
    >
      <div class="f2ps-tile-abbreviation">{{ tile.abbreviation }}</div>
      <div class="f2ps-module-title pl-10">{{ tile.label }}</div>
      <div class="f2ps-module-icon">
        <span class="f2ps-icon" [ngClass]="iconClass(tile)" aria-hidden="true"></span>
      </div>
    </article>
  }
</div>
