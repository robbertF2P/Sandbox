# F2pPlatform local development infrastructure.
#
# SQL + Seq only. For the full tenant UI + API stack, use:
#   ./scripts/podman-up.sh
# (see docker-compose.stack.yml)
#
#   docker compose up -d
#
# Host ports (chosen to avoid default SQL Server 1433 and other SandBox POCs):
#   SQL Server  -> localhost:1402  (POCs use 1400, 1401)
#   Seq UI      -> http://localhost:8083
#   Seq ingest  -> http://localhost:5343  (configure Seq:ServerUrl in appsettings.Development.json)
#
# Local app (not in Compose):
#   API  -> http://localhost:5080  (dotnet run --project host/F2pPlatform.Host)
#   SPA  -> http://localhost:5180  (npm start in web/)

name: f2p-platform-dev

services:
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5343:5341"
      - "8083:80"
    volumes:
      - seq-data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${F2P_MSSQL_SA_PASSWORD:-Your_strong_password123}"
      MSSQL_PID: Developer
    ports:
      - "1402:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  seq-data:
  sqlserver-data:
