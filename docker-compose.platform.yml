# Unified platform stack — Admin backoffice + F2pPlatform v2
#
# Run the full control plane, tenant runtime, and both Angular frontends from one stack:
#
#   docker compose -f docker-compose.platform.yml up --build
#
# URLs (host):
#   Admin UI        http://localhost:5190
#   F2P tenant UI   http://localhost:5180
#   Admin API       http://localhost:5090/swagger
#   F2P API         http://localhost:5080/swagger
#   Seq logs        http://localhost:8080

name: floorganise-platform

services:
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5340:5341"
      - "8080:80"
    volumes:
      - platform-seq-data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${PLATFORM_MSSQL_SA_PASSWORD:-Your_strong_password123}"
      MSSQL_PID: Developer
    volumes:
      - platform-sql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  f2p-platform-api:
    build:
      context: .
      dockerfile: F2pPlatform/host/F2pPlatform.Host/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kestrel__Endpoints__Http__Url: http://0.0.0.0:5080
      Platform__ConfigurationApiKey: "${PLATFORM_CONFIG_API_KEY:?Set PLATFORM_CONFIG_API_KEY}"
      ConnectionStrings__PlatformConfig: "Server=sqlserver,1433;Database=F2pPlatform;User Id=sa;Password=${PLATFORM_MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__HourApprovals: "Server=sqlserver,1433;Database=HourApprovals;User Id=sa;Password=${PLATFORM_MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;Encrypt=False"
      Tenant__FeatureFlags__hours-progress-approval: "true"
      Tenant__PackEntitlements__customizationPacks__0: acme-hour-approvals-v1
      Seq__ServerUrl: http://seq:5341
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    ports:
      - "5080:5080"

  admin-backoffice-api:
    build:
      context: .
      dockerfile: AdminBackoffice/host/AdminBackoffice.Host/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Kestrel__Endpoints__Http__Url: http://0.0.0.0:5090
      ConnectionStrings__ControlPlane: "Server=sqlserver,1433;Database=ControlPlane;User Id=sa;Password=${PLATFORM_MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;Encrypt=False"
      Platform__BaseUrl: http://f2p-platform-api:5080
      Platform__ConfigurationApiKey: "${PLATFORM_CONFIG_API_KEY:?Set PLATFORM_CONFIG_API_KEY}"
      Cors__AllowedOrigins__0: http://localhost:5190
      Seq__ServerUrl: http://seq:5341
    depends_on:
      sqlserver:
        condition: service_healthy
      f2p-platform-api:
        condition: service_started
      seq:
        condition: service_started
    ports:
      - "5090:5090"

  admin-backoffice-web:
    build:
      context: .
      dockerfile: AdminBackoffice/web/Dockerfile
    depends_on:
      - admin-backoffice-api
    ports:
      - "5190:80"

  f2p-platform-web:
    build:
      context: .
      dockerfile: F2pPlatform/web/Dockerfile
    depends_on:
      - f2p-platform-api
    ports:
      - "5180:80"

volumes:
  platform-seq-data:
  platform-sql-data:
