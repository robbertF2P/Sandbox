<div class="admin-page admin-page--narrow">
  <header class="admin-header">
    <div>
      <a routerLink="/tenants" class="admin-back-link">← Tenants</a>
      <h1 class="admin-title">New tenant</h1>
      <p class="admin-subtitle">Provision a tenant in the control plane and push configuration to the v2 platform.</p>
    </div>
  </header>

  @if (error()) {
    <div class="admin-alert admin-alert--error">{{ error() }}</div>
  }

  <form class="admin-card admin-form" (ngSubmit)="submit()">
    <section class="admin-form-section">
      <h2>Identity</h2>
      <label class="admin-field">
        <span>Slug</span>
        <input name="slug" [(ngModel)]="slug" required pattern="[a-z0-9-]+" placeholder="acme-shipyard" />
        <small>Lowercase letters, numbers, and hyphens only.</small>
      </label>
      <label class="admin-field">
        <span>Display name</span>
        <input name="displayName" [(ngModel)]="displayName" required placeholder="Acme Shipyard" />
      </label>
    </section>

    <section class="admin-form-section">
      <h2>Deployment</h2>
      <label class="admin-field">
        <span>Mode</span>
        <select name="mode" [(ngModel)]="mode">
          <option value="Native">Native (v2 platform)</option>
          <option value="LegacyHosted">Legacy hosted</option>
        </select>
      </label>
      <label class="admin-field">
        <span>Data tier</span>
        <select name="dataTier" [(ngModel)]="dataTier">
          <option value="SharedSqlServer">Shared SQL Server</option>
          <option value="DedicatedSqlServer">Dedicated SQL Server</option>
        </select>
      </label>
      <label class="admin-field">
        <span>Region</span>
        <input name="region" [(ngModel)]="region" required placeholder="eu-west" />
      </label>
    </section>

    @if (isLegacy()) {
      <section class="admin-form-section">
        <h2>Legacy runtime</h2>
        <label class="admin-field">
          <span>Build profile ID</span>
          <input name="legacyBuildProfileId" [(ngModel)]="legacyBuildProfileId" required />
        </label>
        <label class="admin-field">
          <span>Runtime URL</span>
          <input name="legacyRuntimeUrl" [(ngModel)]="legacyRuntimeUrl" required />
        </label>
        <label class="admin-field">
          <span>Database connection ref</span>
          <input name="legacyDatabaseConnectionRef" [(ngModel)]="legacyDatabaseConnectionRef" required />
        </label>
      </section>
    } @else {
      <section class="admin-form-section">
        <h2>Native runtime</h2>
        <label class="admin-field">
          <span>Database connection ref</span>
          <input name="nativeDatabaseConnectionRef" [(ngModel)]="nativeDatabaseConnectionRef" required />
        </label>
        <label class="admin-field">
          <span>API base URL</span>
          <input name="nativeApiBaseUrl" [(ngModel)]="nativeApiBaseUrl" required />
        </label>
      </section>
    }

    <section class="admin-form-section">
      <h2>Packs &amp; billing</h2>
      <label class="admin-field">
        <span>Integration packs</span>
        <input name="integrationPacks" [(ngModel)]="integrationPacks" placeholder="comma-separated" />
      </label>
      <label class="admin-field">
        <span>Customization packs</span>
        <input name="customizationPacks" [(ngModel)]="customizationPacks" placeholder="acme-hour-approvals-v1" />
      </label>
      <div class="admin-field-row">
        <label class="admin-field">
          <span>Billing tier</span>
          <input name="billingTier" [(ngModel)]="billingTier" />
        </label>
        <label class="admin-field">
          <span>Seat limit</span>
          <input name="seatLimit" type="number" min="1" [(ngModel)]="seatLimit" />
        </label>
      </div>
    </section>

    <footer class="admin-form-actions">
      <a routerLink="/tenants" class="admin-button admin-button--ghost">Cancel</a>
      <button type="submit" class="admin-button admin-button--primary" [disabled]="saving()">
        {{ saving() ? 'Provisioning…' : 'Create tenant' }}
      </button>
    </footer>
  </form>
</div>
