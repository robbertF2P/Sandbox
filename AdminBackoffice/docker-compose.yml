# Control-plane SQL + Seq for admin backoffice (port 1403 SQL — avoids F2pPlatform 1402 and POCs).
#
#   docker compose up -d
#   dotnet ef database update --project src/ControlPlane.Data.Migrations
#
# Seq UI      -> http://localhost:8083
# Seq ingest  -> http://localhost:5343  (Seq:ServerUrl in appsettings.Development.json)

name: admin-backoffice-dev

services:
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5343:5341"
      - "8083:80"
    volumes:
      - control-plane-seq-data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${CONTROL_PLANE_MSSQL_SA_PASSWORD:-Your_strong_password123}"
      MSSQL_PID: Developer
    ports:
      - "1403:1433"
    volumes:
      - control-plane-sql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  control-plane-seq-data:
  control-plane-sql-data:
