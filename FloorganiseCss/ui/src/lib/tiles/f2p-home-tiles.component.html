<div class="f2p-tile-grid">
  @for (tile of tiles(); track tile.route) {
    <article
      class="f2ps-tile f2ps-clickable border-0 text-white"
      [ngClass]="moduleClass(tile)"
      [attr.data-testid]="'home-tile-' + tile.label.toLowerCase()"
      [attr.aria-label]="tile.label + '. ' + tile.meta"
      (click)="onTileClick(tile)"
      (keyup.enter)="onTileClick(tile)"
      tabindex="0"
      role="button"
    >
      <div class="f2ps-tile-abbreviation">{{ tile.abbreviation }}</div>
      <div class="f2ps-tile-title uppercase text-white">{{ tile.label }}</div>
      <div class="f2ps-tile-content">
        <svg class="size-16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1.5" />
          <rect x="3" y="14" width="7" height="7" rx="1.5" />
          <rect x="14" y="3" width="7" height="7" rx="1.5" />
          <rect x="14" y="14" width="7" height="7" rx="1.5" />
        </svg>
      </div>
      <div class="f2ps-tile-footer">
        <p class="f2ps-tile-footer-description text-white/80">{{ tile.meta }}</p>
      </div>
    </article>
  }
</div>
